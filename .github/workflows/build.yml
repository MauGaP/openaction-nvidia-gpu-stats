name: Build and release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary artifact
        shell: bash
        run: |
          mkdir -p staged
          cp "target/${{ matrix.target }}/release/oagpustats" "staged/oagpustats-${{ matrix.target }}"
          chmod +x "staged/oagpustats-${{ matrix.target }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: staged/oagpustats-${{ matrix.target }}
          compression-level: 0

  package:
    name: Package plugin and publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: bins

      - name: Assemble plugin directory
        run: |
          set -euo pipefail
          PLUGIN_DIR="dev.maugap.oagpustats.sdPlugin"
          mkdir -p "$PLUGIN_DIR"
          cp assets/manifest.json "$PLUGIN_DIR/"
          cp assets/icon.png "$PLUGIN_DIR/"
          cp assets/pi.html "$PLUGIN_DIR/"
          for arch in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            install -m 755 "bins/bin-$arch/oagpustats-$arch" "$PLUGIN_DIR/oagpustats-$arch"
          done
          zip -r dev.maugap.oagpustats.zip "$PLUGIN_DIR"
          ls -la dev.maugap.oagpustats.zip
          unzip -l dev.maugap.oagpustats.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dev.maugap.oagpustats.zip
          generate_release_notes: true
          draft: false
          prerelease: false
